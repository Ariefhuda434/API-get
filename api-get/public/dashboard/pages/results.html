          <div class="section-header">
            <h2>Clip Results</h2>
            <p>Sorted by virality score - best clips first</p>
          </div>

          <div id="results-area">
            <!-- Stats -->
            <div class="grid-4" id="stats-grid">
              <div class="stat-card">
                <div class="stat-value" id="stat-total" style="color: var(--primary);">0</div>
                <div class="stat-label">Total Clips</div>
              </div>
              <div class="stat-card">
                <div class="stat-value" id="stat-avg" style="color: var(--accent);">0%</div>
                <div class="stat-label">Avg Virality</div>
              </div>
              <div class="stat-card">
                <div class="stat-value" id="stat-best" style="color: var(--fire-high);">0%</div>
                <div class="stat-label">Best Score</div>
              </div>
              <div class="stat-card">
                <div class="stat-value" id="stat-preset" style="color: var(--warning);">-</div>
                <div class="stat-label">Preset Used</div>
              </div>
            </div>

            <div class="grid-3" id="clips-grid">
              <!-- Clip cards filled by JS -->
            </div>

            <div class="empty-state" id="results-empty">
              <div class="empty-icon">&#127916;</div>
              <p>No results yet. Create clips to see them here.</p>
            </div>
          </div>

          <!-- Processing state -->
          <div id="processing-area" style="display: none;">
            <div class="processing-card">
              <div class="spinner"></div>
              <h3 style="margin-bottom: 8px;">Processing your video...</h3>
              <p style="color: var(--text-dim); font-size: 14px;" id="processing-status">Analyzing content with AI</p>
              <div class="progress-steps" style="max-width: 400px; margin: 20px auto 0;">
                <div class="progress-step active" id="step-1"></div>
                <div class="progress-step" id="step-2"></div>
                <div class="progress-step" id="step-3"></div>
                <div class="progress-step" id="step-4"></div>
                <div class="progress-step" id="step-5"></div>
              </div>
              <p style="color: var(--text-muted); font-size: 12px; margin-top: 8px;" id="step-label">Step 1/5: Submitting video</p>
            </div>
          </div>

          <!-- Title Editor Modal -->
          <div class="modal-overlay" id="title-editor-modal" style="display: none;">
            <div class="modal">
              <div class="modal-header">
                <h3>Add Title to Clip</h3>
                <button class="modal-close" onclick="closeTitleEditor()">&times;</button>
              </div>
              <div class="modal-body">
                <div class="form-group">
                  <label class="form-label">Clip Source</label>
                  <input type="text" class="form-input" id="te-clip-url" readonly style="font-size:12px;color:var(--text-muted);" />
                </div>
                <div class="form-group">
                  <label class="form-label">Title Text</label>
                  <input type="text" class="form-input" id="te-title" placeholder="e.g. This moment changed everything..." />
                </div>
                <div class="form-group">
                  <label class="form-label">Subtitle</label>
                  <input type="text" class="form-input" id="te-subtitle" placeholder="e.g. Full video linked below" />
                </div>
                <div class="grid-2" style="gap: 16px;">
                  <div class="form-group">
                    <label class="form-label">Template</label>
                    <select class="form-select" id="te-template" onchange="onTitleTemplateChange()">
                      <option value="default">Default</option>
                      <option value="podcast">Podcast</option>
                      <option value="podcast_quote">Podcast Quote</option>
                      <option value="gaming">Gaming</option>
                      <option value="tutorial">Tutorial</option>
                      <option value="minimal">Minimal</option>
                    </select>
                  </div>
                  <div class="form-group">
                    <label class="form-label">Position</label>
                    <select class="form-select" id="te-position">
                      <option value="center">Center</option>
                      <option value="top">Top</option>
                      <option value="bottom">Bottom</option>
                    </select>
                  </div>
                </div>
                <div class="grid-2" style="gap: 16px;">
                  <div class="form-group">
                    <label class="form-label">Title Color</label>
                    <input type="color" class="form-input" id="te-title-color" value="#ffffff" style="height:44px;padding:4px;" />
                  </div>
                  <div class="form-group">
                    <label class="form-label">Background</label>
                    <input type="color" class="form-input" id="te-bg-color" value="#000000" style="height:44px;padding:4px;" />
                  </div>
                </div>
                <div class="form-group" style="margin-bottom:0;">
                  <label class="form-label">Intro Duration</label>
                  <div class="range-group">
                    <input type="range" min="1" max="6" value="3" step="0.5" id="te-duration" oninput="document.getElementById('te-dur-val').textContent=this.value+'s'" />
                    <span class="range-value" id="te-dur-val">3s</span>
                  </div>
                </div>
              </div>
              <div class="modal-footer">
                <div id="te-result" style="display:none;" class="te-result">
                  <span id="te-result-msg"></span>
                  <a id="te-result-link" target="_blank" class="btn btn-primary btn-sm">Download</a>
                </div>
                <div style="display:flex;gap:8px;">
                  <button class="btn btn-secondary" onclick="closeTitleEditor()">Cancel</button>
                  <button class="btn btn-primary" id="te-generate-btn" onclick="generateTitle()">&#9889; Generate Title</button>
                </div>
              </div>
              <div class="te-spinner" id="te-spinner" style="display:none;">
                <div class="spinner" style="width:24px;height:24px;margin:0;"></div>
                <span>Processing title...</span>
              </div>
            </div>
          </div>
