          <div class="editor-layout">
            <div class="editor-toolbar">
              <div class="editor-toolbar-left">
                <div class="editor-source-input">
                  <input type="text" class="form-input" id="editor-video-url" placeholder="Paste video URL atau pilih dari hasil..." style="width:350px;font-size:13px;">
                  <button class="btn btn-primary btn-sm" onclick="loadEditorVideo()">Load</button>
                  <button class="btn btn-outline btn-sm" onclick="document.getElementById('editor-file-input').click()">File</button>
                  <input type="file" id="editor-file-input" accept="video/*" style="display:none" onchange="loadEditorFile(event)">
                </div>
              </div>
              <div class="editor-toolbar-right">
                <button class="btn btn-outline btn-sm" onclick="quickPreview()" title="Quick preview (first 5s, low-res)">Preview</button>
                <button class="btn btn-primary btn-sm" onclick="exportEditedVideo()" id="editor-export-btn">Export</button>
              </div>
            </div>

            <div class="editor-main">
              <div class="editor-preview">
                <div class="editor-preview-container" id="editor-preview-container">
                  <div id="editor-video-wrapper" class="editor-video-wrapper">
                    <video id="editor-video" controls></video>
                  </div>
                  <div class="editor-layers-container" id="editor-layers-container">
                    <!-- Layers rendered by JS -->
                  </div>
                </div>
                <div class="editor-preview-info">
                  <span id="editor-time-current">0:00</span> / <span id="editor-time-duration">0:00</span>
                </div>
              </div>

              <div class="editor-controls">
                <div class="editor-controls-tabs">
                  <button class="editor-tab active" data-tab="text" onclick="switchEditorTab('text')">Text</button>
                  <button class="editor-tab" data-tab="shapes" onclick="switchEditorTab('shapes')">Shapes</button>
                  <button class="editor-tab" data-tab="freeze" onclick="switchEditorTab('freeze')">Freeze</button>
                  <button class="editor-tab" data-tab="video" onclick="switchEditorTab('video')">Video</button>
                  <button class="editor-tab" data-tab="settings" onclick="switchEditorTab('settings')">Settings</button>
                </div>

                <!-- TEXT TAB -->
                <div class="editor-tab-content active" id="editor-tab-text">
                  <div class="editor-controls-section">
                    <div class="editor-section-header">
                      <h4 class="editor-controls-title">Text Layers</h4>
                      <button class="btn btn-xs btn-primary" onclick="addTextLayer()">+ Add Text</button>
                    </div>
                    <div class="editor-layer-list" id="editor-layer-list">
                      <div class="editor-layer-empty">No text layers</div>
                    </div>
                  </div>
                  <div class="editor-controls-section" id="editor-text-controls" style="display:none;">
                    <div class="form-group">
                      <label class="form-label">Text</label>
                      <textarea class="form-textarea" id="editor-text-input" rows="2" oninput="updateSelected()" placeholder="Teks..."></textarea>
                    </div>
                    <div class="form-row">
                      <div class="form-group">
                        <label class="form-label">Font</label>
                        <select class="form-select" id="editor-font" onchange="updateSelected()">
                          <option value="Arial">Arial</option>
                          <option value="Helvetica">Helvetica</option>
                          <option value="Verdana">Verdana</option>
                          <option value="Georgia">Georgia</option>
                          <option value="Times New Roman">Times New Roman</option>
                          <option value="Courier New">Courier New</option>
                          <option value="Impact">Impact</option>
                          <option value="Comic Sans MS">Comic Sans MS</option>
                          <option value="Montserrat">Montserrat</option>
                          <option value="Poppins">Poppins</option>
                          <option value="Roboto">Roboto</option>
                          <option value="Oswald">Oswald</option>
                        </select>
                      </div>
                      <div class="form-group">
                        <label class="form-label">Size</label>
                        <input type="range" class="form-range" id="editor-font-size" min="12" max="120" value="48" oninput="updateSelected()">
                      </div>
                    </div>
                    <div class="form-row">
                      <div class="form-group">
                        <label class="form-label">Color</label>
                        <input type="color" class="form-input" id="editor-font-color" value="#ffffff" oninput="updateSelected()" style="height:38px;padding:2px;">
                      </div>
                      <div class="form-group">
                        <label class="form-label">Opacity</label>
                        <input type="range" class="form-range" id="editor-text-opacity" min="0" max="100" value="100" oninput="updateSelected()">
                      </div>
                    </div>
                    <div class="form-row">
                      <div class="form-group">
                        <label class="form-label">BG Color</label>
                        <input type="color" class="form-input" id="editor-text-bgcolor" value="#000000" oninput="updateSelected()" style="height:38px;padding:2px;">
                      </div>
                      <div class="form-group">
                        <label class="form-label">BG Opacity</label>
                        <input type="range" class="form-range" id="editor-text-bgopacity" min="0" max="100" value="0" oninput="updateSelected()">
                      </div>
                    </div>
                    <div class="form-row">
                      <div class="form-group">
                        <label class="form-label">Style</label>
                        <select class="form-select" id="editor-text-style" onchange="updateSelected()">
                          <option value="normal">Normal</option>
                          <option value="bold">Bold</option>
                          <option value="outline">Outline</option>
                          <option value="shadow">Shadow</option>
                          <option value="glow">Glow</option>
                        </select>
                      </div>
                      <div class="form-group">
                        <label class="form-label">Spacing</label>
                        <input type="range" class="form-range" id="editor-text-spacing" min="0" max="20" value="0" oninput="updateSelected()">
                      </div>
                    </div>
                    <div class="form-group">
                      <label class="form-label">BG Radius</label>
                      <input type="range" class="form-range" id="editor-text-bgradius" min="0" max="50" value="4" oninput="updateSelected()">
                    </div>
                    <div class="form-group">
                      <label class="form-label">Alignment</label>
                      <div style="display:flex;gap:4px;">
                        <button class="btn btn-xs btn-outline editor-align-btn active" data-align="left" onclick="document.querySelectorAll('.editor-align-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');updateSelected();">≡ Left</button>
                        <button class="btn btn-xs btn-outline editor-align-btn" data-align="center" onclick="document.querySelectorAll('.editor-align-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');updateSelected();">≡ Center</button>
                        <button class="btn btn-xs btn-outline editor-align-btn" data-align="right" onclick="document.querySelectorAll('.editor-align-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');updateSelected();">≡ Right</button>
                      </div>
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                      <label class="form-label">Position</label>
                      <div style="display:flex;gap:8px;align-items:center;">
                        <span style="font-size:11px;color:var(--text-dim);min-width:12px;">X:</span>
                        <input type="range" class="form-range" id="editor-layer-x" min="0" max="100" value="50" oninput="updateSelected()" style="flex:1;">
                        <span id="editor-layer-x-val" style="font-size:11px;min-width:30px;color:var(--text-dim);">50%</span>
                        <span style="font-size:11px;color:var(--text-dim);min-width:12px;margin-left:8px;">Y:</span>
                        <input type="range" class="form-range" id="editor-layer-y" min="0" max="100" value="50" oninput="updateSelected()" style="flex:1;">
                        <span id="editor-layer-y-val" style="font-size:11px;min-width:30px;color:var(--text-dim);">50%</span>
                      </div>
                    </div>
                    <div style="margin-top:6px;display:flex;gap:4px;flex-wrap:wrap;">
                      <button class="btn btn-xs btn-outline" onclick="alignLayer('left')">◀ Left</button>
                      <button class="btn btn-xs btn-outline" onclick="alignLayer('center-h')">↔ Center</button>
                      <button class="btn btn-xs btn-outline" onclick="alignLayer('right')">Right ▶</button>
                      <button class="btn btn-xs btn-outline" onclick="alignLayer('top')">▲ Top</button>
                      <button class="btn btn-xs btn-outline" onclick="alignLayer('center-v')">↕ Middle</button>
                      <button class="btn btn-xs btn-outline" onclick="alignLayer('bottom')">Bottom ▼</button>
                    </div>
                    <div style="margin-top:8px;">
                      <button class="btn btn-sm btn-danger" onclick="deleteSelectedLayer()">Delete Layer</button>
                    </div>
                  </div>
                </div>

                <!-- SHAPES TAB -->
                <div class="editor-tab-content" id="editor-tab-shapes">
                  <div class="editor-controls-section">
                    <div class="editor-section-header">
                      <h4 class="editor-controls-title">Shapes</h4>
                    </div>
                    <div class="editor-shape-palette">
                      <button class="editor-shape-btn" onclick="addShapeLayer('rectangle')" title="Rectangle">▬</button>
                      <button class="editor-shape-btn" onclick="addShapeLayer('circle')" title="Circle">●</button>
                      <button class="editor-shape-btn" onclick="addShapeLayer('ellipse')" title="Ellipse">⬮</button>
                      <button class="editor-shape-btn" onclick="addShapeLayer('triangle')" title="Triangle">▲</button>
                      <button class="editor-shape-btn" onclick="addShapeLayer('star')" title="Star">★</button>
                      <button class="editor-shape-btn" onclick="addShapeLayer('diamond')" title="Diamond">◆</button>
                      <button class="editor-shape-btn" onclick="addShapeLayer('arrow')" title="Arrow">➤</button>
                      <button class="editor-shape-btn" onclick="addShapeLayer('line')" title="Line">╌</button>
                    </div>
                    <div class="editor-layer-list" id="editor-layer-list-shapes">
                      <div class="editor-layer-empty">No shapes. Pick one above</div>
                    </div>
                  </div>
                  <div class="editor-controls-section" id="editor-shape-controls" style="display:none;">
                    <div class="form-row">
                      <div class="form-group">
                        <label class="form-label">Width</label>
                        <input type="range" class="form-range" id="editor-shape-width" min="5" max="100" value="20" oninput="updateSelected()">
                      </div>
                      <div class="form-group">
                        <label class="form-label">Height</label>
                        <input type="range" class="form-range" id="editor-shape-height" min="5" max="100" value="20" oninput="updateSelected()">
                      </div>
                    </div>
                    <div class="form-row">
                      <div class="form-group">
                        <label class="form-label">Color</label>
                        <input type="color" class="form-input" id="editor-shape-color" value="#ffffff" oninput="updateSelected()" style="height:38px;padding:2px;">
                      </div>
                      <div class="form-group">
                        <label class="form-label">Opacity</label>
                        <input type="range" class="form-range" id="editor-shape-opacity" min="0" max="100" value="100" oninput="updateSelected()">
                      </div>
                    </div>
                    <div class="form-row">
                      <div class="form-group">
                        <label class="form-label">Border</label>
                        <input type="range" class="form-range" id="editor-shape-border" min="0" max="20" value="0" oninput="updateSelected()">
                      </div>
                      <div class="form-group">
                        <label class="form-label">Border Color</label>
                        <input type="color" class="form-input" id="editor-shape-bordercolor" value="#ffffff" oninput="updateSelected()" style="height:38px;padding:2px;">
                      </div>
                    </div>
                    <div class="form-group">
                      <label class="form-label">Rotation °</label>
                      <input type="range" class="form-range" id="editor-shape-rotation" min="0" max="360" value="0" oninput="updateSelected()">
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                      <label class="form-label">Position</label>
                      <div style="display:flex;gap:8px;align-items:center;">
                        <span style="font-size:11px;color:var(--text-dim);min-width:12px;">X:</span>
                        <input type="range" class="form-range" id="editor-layer-x-shape" min="0" max="100" value="50" oninput="updateSelected()" style="flex:1;">
                        <span id="editor-layer-x-val-shape" style="font-size:11px;min-width:30px;color:var(--text-dim);">50%</span>
                        <span style="font-size:11px;color:var(--text-dim);min-width:12px;margin-left:8px;">Y:</span>
                        <input type="range" class="form-range" id="editor-layer-y-shape" min="0" max="100" value="50" oninput="updateSelected()" style="flex:1;">
                        <span id="editor-layer-y-val-shape" style="font-size:11px;min-width:30px;color:var(--text-dim);">50%</span>
                      </div>
                    </div>
                    <div style="margin-top:6px;display:flex;gap:4px;flex-wrap:wrap;">
                      <button class="btn btn-xs btn-outline" onclick="alignLayer('left')">◀ Left</button>
                      <button class="btn btn-xs btn-outline" onclick="alignLayer('center-h')">↔ Center</button>
                      <button class="btn btn-xs btn-outline" onclick="alignLayer('right')">Right ▶</button>
                      <button class="btn btn-xs btn-outline" onclick="alignLayer('top')">▲ Top</button>
                      <button class="btn btn-xs btn-outline" onclick="alignLayer('center-v')">↕ Middle</button>
                      <button class="btn btn-xs btn-outline" onclick="alignLayer('bottom')">Bottom ▼</button>
                    </div>
                    <div style="margin-top:8px;">
                      <button class="btn btn-sm btn-danger" onclick="deleteSelectedLayer()">Delete Shape</button>
                    </div>
                  </div>
                </div>

                <!-- FREEZE TAB -->
                <div class="editor-tab-content" id="editor-tab-freeze">
                  <div class="editor-controls-section">
                    <h4 class="editor-controls-title">Freeze Frame Title</h4>
                    <div class="form-group">
                      <label class="form-label">
                        <input type="checkbox" id="editor-freeze-enable" onchange="updateFreeze()" style="margin-right:6px;">
                        Enable freeze frame intro
                      </label>
                    </div>
                    <div class="form-group">
                      <label class="form-label">Freeze at (second)</label>
                      <input type="number" class="form-input" id="editor-freeze-time" value="1" min="0" step="0.5" style="width:80px;">
                    </div>
                    <div class="form-group">
                      <label class="form-label">Duration</label>
                      <select class="form-select" id="editor-freeze-duration">
                        <option value="2">2s</option>
                        <option value="3" selected>3s</option>
                        <option value="4">4s</option>
                        <option value="5">5s</option>
                      </select>
                    </div>
                    <div class="form-group">
                      <label class="form-label">Title</label>
                      <input type="text" class="form-input" id="editor-freeze-title" placeholder="Title text">
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                      <label class="form-label">Subtitle</label>
                      <input type="text" class="form-input" id="editor-freeze-subtitle" placeholder="Subtitle">
                    </div>
                  </div>
                </div>

                <!-- VIDEO TAB -->
                <div class="editor-tab-content" id="editor-tab-video">
                  <div class="editor-controls-section">
                    <h4 class="editor-controls-title">Video Layer</h4>
                  </div>
                  <div class="editor-controls-section" id="editor-video-controls" style="display:none;">
                    <div class="form-group">
                      <label class="form-label">Zoom <span id="editor-video-scale-val">100%</span></label>
                      <input type="range" class="form-range" id="editor-video-scale" min="50" max="500" value="100" oninput="updateVideoLayer()">
                    </div>
                    <div class="form-group">
                      <label class="form-label">Position Y</label>
                      <input type="range" class="form-range" id="editor-video-y" min="0" max="100" value="50" oninput="updateVideoLayer()">
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                      <label class="form-label">Zoom</label>
                      <input type="range" class="form-range" id="editor-video-scale" min="50" max="500" value="100" oninput="updateVideoLayer()">
                    </div>
                  </div>
                </div>

                <!-- SETTINGS TAB -->
                <div class="editor-tab-content" id="editor-tab-settings">
                  <div class="editor-controls-section">
                    <h4 class="editor-controls-title">Frame Preset</h4>
                    <div class="form-group" style="margin-bottom:0;">
                      <select class="form-select" id="editor-frame-preset" onchange="updateFramePreset()">
                        <option value="none">Original</option>
                        <option value="9:16">TikTok / Reels / Shorts (9:16)</option>
                        <option value="1:1">Instagram Feed (1:1)</option>
                        <option value="4:5">Instagram Portrait (4:5)</option>
                        <option value="16:9">YouTube / Landscape (16:9)</option>
                      </select>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="editor-timeline">
              <div class="editor-timeline-header">
                <div class="editor-timeline-controls">
                  <button class="btn btn-sm btn-icon" onclick="zoomTimeline(-1)" title="Zoom Out">−</button>
                  <span class="editor-zoom-level" id="editor-zoom-level">1x</span>
                  <button class="btn btn-sm btn-icon" onclick="zoomTimeline(1)" title="Zoom In">+</button>
                  <span class="editor-timeline-sep"></span>
                  <button class="btn btn-sm btn-outline" onclick="splitAtPlayhead()" title="Split at playhead (S)">✂ Split</button>
                  <button class="btn btn-sm btn-outline" onclick="removeSelectedSegment()" title="Delete selected segment">🗑</button>
                </div>
                <div class="editor-timeline-time" id="editor-timeline-ruler">0:00</div>
              </div>
              <div class="editor-timeline-track-area" id="editor-timeline-track">
                <canvas id="editor-timeline-canvas"></canvas>
                <div class="editor-playhead" id="editor-playhead"></div>
                <div class="editor-timeline-placeholder" id="editor-timeline-empty">
                  <p>Load a video to start editing</p>
                </div>
              </div>
            </div>

            <div id="editor-export-progress" class="editor-export-progress" style="display:none;">
              <div class="te-spinner"><div class="spinner"></div><span>Processing video...</span></div>
              <div class="editor-export-result" style="display:none;"></div>
            </div>
          </div>
